# Unified minion stack — Caddy ingress + hub + paperclip + gateway + postgres
# No `version:` field — uses modern Compose Spec syntax.
#
# Required env vars (set in shell or .env at repo root):
#   HUB_PAPERCLIP_SHARED_SECRET   — HS256 secret shared by hub + paperclip
#   OPENCLAW_GATEWAY_TOKEN        — Gateway auth token
#
# Optional env vars (have defaults):
#   POSTGRES_PASSWORD             — default: changeme
#   BETTER_AUTH_SECRET            — default: devsecret (change for prod)
#   PUBLIC_HOST                   — default: localhost (set to your domain for prod)

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: minion
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./compose/postgres-init.sh:/docker-entrypoint-initdb.d/init.sh:ro
    networks:
      - minion_internal
    # Not exposed externally — internal only
    restart: unless-stopped

  paperclip:
    build:
      context: ./paperclip-minion
      args:
        INCLUDE_UI: "0"
    environment:
      DISABLE_UI: "1"
      DATABASE_URL: postgres://minion:${POSTGRES_PASSWORD:-changeme}@postgres:5432/paperclip
      HUB_PAPERCLIP_SHARED_SECRET: ${HUB_PAPERCLIP_SHARED_SECRET}
      PORT: "3200"
      PAPERCLIP_MIGRATION_AUTO_APPLY: "true"
    depends_on:
      - postgres
    networks:
      - minion_internal
    # Not exposed externally — accessed via hub proxy at /api/pc/*
    restart: unless-stopped

  hub:
    build:
      context: ./minion_hub
    environment:
      # Hub uses libsql with a local SQLite file — no Turso token needed for dev
      TURSO_DB_URL: file:/app/data/minion_hub.db
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-devsecret}
      HUB_PAPERCLIP_SHARED_SECRET: ${HUB_PAPERCLIP_SHARED_SECRET}
      PAPERCLIP_INTERNAL_URL: http://paperclip:3200
      PORT: "3000"
    volumes:
      # Persist hub's SQLite file across restarts
      - hub-sqlite:/app/data
    depends_on:
      - paperclip
    networks:
      - minion_internal
    # Not exposed externally — fronted by Caddy
    restart: unless-stopped

  gateway:
    build:
      context: ./minion
    environment:
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      PORT: "8080"
    networks:
      - minion_internal
    # Not exposed externally — WS traffic routed via Caddy @ws matcher
    restart: unless-stopped

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
    environment:
      PUBLIC_HOST: ${PUBLIC_HOST:-localhost}
    depends_on:
      - hub
      - paperclip
      - gateway
    networks:
      - minion_internal
    restart: unless-stopped

networks:
  minion_internal:
    driver: bridge

volumes:
  postgres-data:
  caddy-data:
  hub-sqlite:
